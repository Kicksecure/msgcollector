## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/reusable-bandit.yml

name: bandit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-bandit.yml@master
    with:
      paths: usr/libexec/msgcollector
      ## msgcollector's Python scripts live at usr/libexec/msgcollector/
      ## with no extension (Debian libexec convention). bandit
      ## discovers files by '.py'; ci/python-prepare.sh creates clean
      ## '<name>.py' symlinks for each shebang-declared Python script.
      prepare-command: ci/python-prepare.sh
    permissions:
      contents: read
