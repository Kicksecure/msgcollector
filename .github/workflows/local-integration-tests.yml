name: integration-tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      ## Shared cache-key with local-unit-tests.yml: both workflows
      ## install the same apt set, so the cache is interchangeable.
      ## The hashFiles list covers BOTH workflows so a change in
      ## either invalidates the cache; the keys then re-converge
      ## once the change lands.
      - name: Install system dependencies
        uses: org-ai-assisted/developer-meta-files/.github/actions/apt-install-with-cache@master
        with:
          packages: 'bash safe-rm moreutils procps inotify-tools'
          cache-key: ${{ runner.os }}-apt-msgcollector-tests-${{ hashFiles('.github/workflows/local-integration-tests.yml', '.github/workflows/local-unit-tests.yml', 'ci/install-helper-scripts.sh') }}

      - name: Install helper-scripts
        run: ci/install-helper-scripts.sh

      ## Install msgcollector via genmkfile install (same pattern as
      ## developer-meta-files/.github/workflows/local-org-tools-mock-
      ## tests.yml). install-helper-scripts: 'false' because the
      ## previous step handled helper-scripts via the custom
      ## cp-based bypass (keeps build-time deps minimal - see
      ## ci/install-helper-scripts.sh header).
      - name: Install msgcollector via genmkfile install
        uses: org-ai-assisted/developer-meta-files/.github/actions/install-deps@master
        with:
          install-helper-scripts: 'false'
          install-self: 'true'

      ## Run-directory bootstrap (/run/user/<uid>) was previously
      ## done here with sudo; it now lives in tests/integration-
      ## tests.bash next to the folder_init call that consumes it.
      ## Workflow stays orchestration-only.

      - name: Run integration tests
        run: tests/integration-tests.bash
