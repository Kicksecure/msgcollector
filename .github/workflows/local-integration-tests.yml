name: integration-tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare apt cache directory
        run: |
          sudo --non-interactive mkdir --parents -- /var/cache/apt/archives
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" /var/cache/apt/archives

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          ## Shared key prefix with local-unit-tests.yml: both install
          ## the same apt set, so the cache is interchangeable.
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-msgcollector-tests-${{ hashFiles('ci/install-helper-scripts.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-msgcollector-tests-

      - name: Install system dependencies
        run: |
          sudo --non-interactive apt-get update
          sudo --non-interactive apt-get install --yes \
            bash safe-rm moreutils procps inotify-tools

      - name: Install helper-scripts
        run: ci/install-helper-scripts.sh

      - name: Install msgcollector scripts
        run: sudo --non-interactive cp --recursive -- usr/libexec/msgcollector /usr/libexec/msgcollector

      - name: Set up run directory
        run: |
          sudo --non-interactive mkdir --parents -- "/run/user/$(id -u)/msgcollector"
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" "/run/user/$(id -u)"

      - name: Run integration tests
        run: tests/integration-tests.bash
