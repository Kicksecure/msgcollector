name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on Bash scripts
        run: |
          exit_code=0
          while IFS= read -r -d '' file; do
            head_line="$(head -1 "$file")"
            case "${head_line}" in
              *"/bin/bash"*|*"/bin/sh"*)
                printf '%s\n' "Checking: ${file}"
                ## SC1091, SC1090: Not following sourced files (external deps).
                ## SC2034: Variables appear unused because they are consumed by
                ## sourcing scripts via indirection (e.g. check_is_alpha_numeric
                ## takes a variable name and reads it with ${!varname}).
                ## SC2154: Variables are set by sourced helper libraries
                ## (strings.bsh, msgcollector_shared, etc.).
                ## SC2086: Intentional word-splitting in pv_wrapper eval and a
                ## few other places where the caller exports multi-word commands.
                shellcheck --shell=bash \
                  --exclude=SC1091,SC1090,SC2034,SC2154,SC2086 \
                  --severity=warning \
                  -- "${file}" || exit_code=1
                ;;
            esac
          done < <(find usr/libexec/msgcollector etc/profile.d -type f -print0 2>/dev/null)
          exit "${exit_code}"

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install linters
        run: pip install pycodestyle pyflakes

      - name: Run pyflakes
        run: |
          exit_code=0
          for file in usr/libexec/msgcollector/alert \
                      usr/libexec/msgcollector/generic_gui_message \
                      usr/libexec/msgcollector/msgdispatcher_dispatch_x \
                      usr/libexec/msgcollector/one-time-popup \
                      usr/libexec/msgcollector/tb_updater_gui \
                      usr/libexec/msgcollector/br_add; do
            printf '%s\n' "Checking: ${file}"
            pyflakes "${file}" || exit_code=1
          done
          exit "${exit_code}"

      - name: Run pycodestyle
        run: |
          exit_code=0
          for file in usr/libexec/msgcollector/alert \
                      usr/libexec/msgcollector/generic_gui_message \
                      usr/libexec/msgcollector/msgdispatcher_dispatch_x \
                      usr/libexec/msgcollector/one-time-popup \
                      usr/libexec/msgcollector/tb_updater_gui \
                      usr/libexec/msgcollector/br_add; do
            printf '%s\n' "Checking: ${file}"
            ## E501: project uses long descriptive argparse help strings.
            ## W503/W504: conflicting rules for line breaks around operators.
            ## E266: project-wide convention to use ## for block comments in
            ## both bash and Python files (see 'grep -l "^## Copyright"'
            ## across usr/libexec/msgcollector/ - all 18 files use ##).
            pycodestyle --max-line-length=120 \
              --ignore=E501,W503,W504,E266 \
              -- "${file}" || exit_code=1
          done
          exit "${exit_code}"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            safe-rm \
            moreutils \
            procps \
            inotify-tools

      - name: Install helper-scripts
        run: |
          ## Clone and install helper-scripts files directly (bypassing
          ## genmkfile to avoid additional build-time dependencies).
          git clone --depth=1 https://github.com/Kicksecure/helper-scripts.git /tmp/helper-scripts
          sudo cp -r /tmp/helper-scripts/usr/libexec/helper-scripts /usr/libexec/helper-scripts
          sudo cp -r /tmp/helper-scripts/usr/lib/python3/dist-packages/. \
            /usr/lib/python3/dist-packages/
          for tool in stecho stcat unicode-show sanitize-string strip-markup; do
            if [ -f "/tmp/helper-scripts/usr/bin/${tool}" ]; then
              sudo cp "/tmp/helper-scripts/usr/bin/${tool}" "/usr/bin/${tool}"
            fi
          done

      - name: Install msgcollector scripts
        run: |
          sudo cp -r usr/libexec/msgcollector /usr/libexec/msgcollector

      - name: Set up run directory
        run: |
          sudo mkdir -p "/run/user/$(id -u)/msgcollector"
          sudo chown -R "$(id -u):$(id -g)" "/run/user/$(id -u)"

      - name: Run unit tests
        run: bash tests/unit-tests.bash

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash \
            safe-rm \
            moreutils \
            procps \
            inotify-tools

      - name: Install helper-scripts
        run: |
          git clone --depth=1 https://github.com/Kicksecure/helper-scripts.git /tmp/helper-scripts
          sudo cp -r /tmp/helper-scripts/usr/libexec/helper-scripts /usr/libexec/helper-scripts
          sudo cp -r /tmp/helper-scripts/usr/lib/python3/dist-packages/. \
            /usr/lib/python3/dist-packages/
          for tool in stecho stcat unicode-show sanitize-string strip-markup; do
            if [ -f "/tmp/helper-scripts/usr/bin/${tool}" ]; then
              sudo cp "/tmp/helper-scripts/usr/bin/${tool}" "/usr/bin/${tool}"
            fi
          done

      - name: Install msgcollector scripts
        run: |
          sudo cp -r usr/libexec/msgcollector /usr/libexec/msgcollector

      - name: Set up run directory
        run: |
          sudo mkdir -p "/run/user/$(id -u)/msgcollector"
          sudo chown -R "$(id -u):$(id -g)" "/run/user/$(id -u)"

      - name: Run integration tests
        run: bash tests/integration-tests.bash
