name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare apt cache directory
        run: |
          sudo --non-interactive mkdir --parents -- /var/cache/apt/archives
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" /var/cache/apt/archives

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-shellcheck-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-shellcheck-

      - name: Install ShellCheck
        run: sudo --non-interactive apt-get update && sudo --non-interactive apt-get install --yes shellcheck

      - name: Run ShellCheck
        run: ci/shellcheck-run.sh

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.x"

      - name: Install linters
        run: pip install pycodestyle pyflakes

      - name: Run pyflakes
        run: ci/pyflakes-run.sh

      - name: Run pycodestyle
        run: ci/pycodestyle-run.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare apt cache directory
        run: |
          sudo --non-interactive mkdir --parents -- /var/cache/apt/archives
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" /var/cache/apt/archives

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          ## Shared key with integration-tests below: both jobs install
          ## the same package set, so a single cache entry serves both.
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-msgcollector-tests-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-msgcollector-tests-

      - name: Install system dependencies
        run: |
          sudo --non-interactive apt-get update
          sudo --non-interactive apt-get install --yes \
            bash safe-rm moreutils procps inotify-tools

      - name: Install helper-scripts
        run: ci/install-helper-scripts.sh

      - name: Install msgcollector scripts
        run: sudo --non-interactive cp --recursive -- usr/libexec/msgcollector /usr/libexec/msgcollector

      - name: Set up run directory
        run: |
          sudo --non-interactive mkdir --parents -- "/run/user/$(id -u)/msgcollector"
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" "/run/user/$(id -u)"

      - name: Run unit tests
        run: tests/unit-tests.bash

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare apt cache directory
        run: |
          sudo --non-interactive mkdir --parents -- /var/cache/apt/archives
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" /var/cache/apt/archives

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          ## Shared key with unit-tests above: same package set, single
          ## cache entry serves both jobs.
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-msgcollector-tests-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-msgcollector-tests-

      - name: Install system dependencies
        run: |
          sudo --non-interactive apt-get update
          sudo --non-interactive apt-get install --yes \
            bash safe-rm moreutils procps inotify-tools

      - name: Install helper-scripts
        run: ci/install-helper-scripts.sh

      - name: Install msgcollector scripts
        run: sudo --non-interactive cp --recursive -- usr/libexec/msgcollector /usr/libexec/msgcollector

      - name: Set up run directory
        run: |
          sudo --non-interactive mkdir --parents -- "/run/user/$(id -u)/msgcollector"
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" "/run/user/$(id -u)"

      - name: Run integration tests
        run: tests/integration-tests.bash
