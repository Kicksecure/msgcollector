name: unit-tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      ## Shared cache-key with local-integration-tests.yml: both
      ## workflows install the same apt set, so the cache is
      ## interchangeable. The hashFiles list covers BOTH workflows
      ## so a change in either invalidates the cache; the keys
      ## then re-converge once the change lands.
      - name: Install system dependencies
        uses: org-ai-assisted/developer-meta-files/.github/actions/apt-install-with-cache@master
        with:
          packages: 'bash safe-rm moreutils procps inotify-tools'
          cache-key: ${{ runner.os }}-apt-msgcollector-tests-${{ hashFiles('.github/workflows/local-integration-tests.yml', '.github/workflows/local-unit-tests.yml', 'ci/install-helper-scripts.sh') }}

      - name: Install helper-scripts
        run: ci/install-helper-scripts.sh

      - name: Install msgcollector scripts
        run: sudo --non-interactive cp --recursive -- usr/libexec/msgcollector /usr/libexec/msgcollector

      - name: Set up run directory
        run: |
          sudo --non-interactive mkdir --parents -- "/run/user/$(id -u)/msgcollector"
          sudo --non-interactive chown --recursive -- "$(id -u):$(id -g)" "/run/user/$(id -u)"

      - name: Run unit tests
        run: tests/unit-tests.bash
